version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: cwns_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ninja_saga_cw
      MYSQL_USER: cwns_user
      MYSQL_PASSWORD: cwns_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
